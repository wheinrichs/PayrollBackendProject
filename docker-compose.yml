version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: PayrollBackendProject.API/Dockerfile
    ports:
      - "5000:8080"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: